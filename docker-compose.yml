services:
  app:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - db-data:/app/server/db
      - uploads:/app/server/uploads
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s

volumes:
  db-data:
  uploads:
