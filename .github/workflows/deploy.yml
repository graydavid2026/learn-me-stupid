name: Deploy to Azure Container Apps

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: |
          echo ${{ secrets.ACR_PASSWORD }} | docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build and push image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/learn-me-stupid:${{ github.sha }} \
                       -t ${{ secrets.ACR_LOGIN_SERVER }}/learn-me-stupid:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/learn-me-stupid:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/learn-me-stupid:latest

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name learn-me-stupid \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/learn-me-stupid:${{ github.sha }}

      - name: Verify deployment
        run: |
          sleep 15
          FQDN=$(az containerapp show \
            --name learn-me-stupid \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${FQDN}/api/health")
          if [ "$STATUS" -eq 200 ]; then
            echo "Deployment verified - health check returned 200 at https://${FQDN}/api/health"
          else
            echo "Health check returned $STATUS at https://${FQDN}/api/health"
            exit 1
          fi
